[package]
resolver = "2"
name = "puzzle"
version = "0.1.0"
authors = ["doomy <2640792-_doomy@users.noreply.gitlab.com>"]
edition = "2018"

[lib]
name = "pz"

# Dependencies for all targets go here.
[dependencies]
serde = "*"
ron = "*"
anyhow = "*"
bevy_asset_ron = "0.2"
rand = {version = "*"}

[dependencies.bevy]
version = "0.5"
default_features = true
features = ["serialize", "render", "png", "x11"]

[dependencies.bevy_egui]
version = "0.7"
